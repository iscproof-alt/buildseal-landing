<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BuildSeal — Communication Evidence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c10;--bg2:#0d1117;--bg3:#111820;--border:#1e2d3d;--border2:#243040;--green:#00e676;--green-dim:rgba(0,230,118,0.08);--green-dim2:rgba(0,230,118,0.15);--yellow:#ffd740;--yellow-dim:rgba(255,215,64,0.08);--text:#e8f0fe;--text2:#8899aa;--text3:#556677;--mono:'Space Mono',monospace;--sans:'DM Sans',sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,12,16,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .nav-logo{font-family:var(--mono);font-size:1em;color:var(--green);text-decoration:none}
  .nav-logo span{color:var(--text2)}
  .nav-right{display:flex;align-items:center;gap:20px}
  .nav-link{color:var(--text3);text-decoration:none;font-size:0.85em;transition:color 0.2s}
  .nav-link:hover{color:var(--text2)}
  .nav-badge{font-family:var(--mono);font-size:0.68em;color:var(--green);border:1px solid rgba(0,230,118,0.3);padding:3px 9px;border-radius:20px}
  main{position:relative;z-index:1;min-height:100vh;padding:100px 24px 60px;display:flex;flex-direction:column;align-items:center}
  .loading{display:flex;flex-direction:column;align-items:center;gap:16px;margin-top:80px}
  .spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-family:var(--mono);font-size:0.78em;color:var(--text3);letter-spacing:1px}
  .container{width:100%;max-width:900px;opacity:0;animation:fadeUp 0.5s ease forwards}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .ev-header{background:var(--bg2);border:1px solid var(--border);border-radius:14px 14px 0 0;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .ev-eyebrow{font-family:var(--mono);font-size:0.65em;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
  .ev-title{font-family:var(--mono);font-size:1.1em;color:var(--text);font-weight:700}
  .ev-seal-id{font-family:var(--mono);font-size:0.7em;color:var(--green);margin-top:4px}
  .integrity-badge{display:flex;align-items:center;gap:8px;background:var(--green-dim);border:1px solid rgba(0,230,118,0.25);padding:8px 16px;border-radius:8px}
  .integrity-badge .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  .integrity-badge span{font-family:var(--mono);font-size:0.72em;color:var(--green);letter-spacing:1px}
  .tabs-bar{background:var(--bg2);border:1px solid var(--border);border-top:none;padding:0 32px;display:flex}
  .tab-btn{font-family:var(--mono);font-size:0.72em;color:var(--text3);padding:14px 20px;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;letter-spacing:0.5px}
  .tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
  .tab-btn:hover{color:var(--text2)}
  .message-section{background:var(--bg2);border:1px solid var(--border);border-top:none}
  .tab-content{display:none;padding:24px 32px}
  .tab-content.active{display:block}
  .message-label{font-family:var(--mono);font-size:0.63em;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .tag{padding:2px 8px;border-radius:4px;font-size:0.85em}
  .tag-draft{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,215,64,0.2)}
  .tag-final{background:var(--green-dim);color:var(--green);border:1px solid rgba(0,230,118,0.2)}
  .message-body{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:20px 24px;font-family:var(--mono);font-size:0.8em;line-height:1.8;color:var(--text2);word-break:break-word}
  .hash-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
  .hash-label{font-family:var(--mono);font-size:0.63em;color:var(--text3);letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
  .hash-val{font-family:var(--mono);font-size:0.75em;color:var(--text2)}
  .integrity-ok{font-family:var(--mono);font-size:0.68em;color:var(--green);background:var(--green-dim);border:1px solid rgba(0,230,118,0.2);padding:2px 8px;border-radius:4px;flex-shrink:0}
  .diff-box{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:20px 24px;font-family:var(--mono);font-size:0.8em;line-height:1.9;word-break:break-word}
  .diff-removed{color:#ff5252;background:rgba(255,82,82,0.08);border-radius:3px;padding:1px 4px;text-decoration:line-through}
  .diff-added{color:var(--green);background:var(--green-dim);border-radius:3px;padding:1px 4px}
  .diff-note{margin-top:12px;font-family:var(--mono);font-size:0.7em;color:var(--text3)}
  .meta-section{background:var(--bg2);border:1px solid var(--border);border-top:none;padding:20px 32px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
  .meta-label{font-family:var(--mono);font-size:0.63em;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
  .meta-value{font-family:var(--mono);font-size:0.78em;color:var(--text2)}
  .actions-section{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 14px 14px;padding:20px 32px;display:flex;gap:10px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;font-family:var(--sans);font-size:0.85em;font-weight:600;cursor:pointer;text-decoration:none;border:none;transition:all 0.2s}
  .btn-primary{background:var(--green-dim2);color:var(--green);border:1px solid rgba(0,230,118,0.25)}
  .btn-primary:hover{background:rgba(0,230,118,0.25)}
  .btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
  .btn-secondary:hover{color:var(--text);border-color:var(--text3)}
  .copy-btn{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:4px;padding:2px 8px;font-size:0.65em;cursor:pointer;font-family:var(--mono);transition:all 0.2s;margin-left:6px}
  .copy-btn:hover{color:var(--green);border-color:rgba(0,230,118,0.3)}
  .not-found{text-align:center;padding:80px 24px}
  .not-found h2{font-family:var(--mono);color:#ff5252;font-size:1.1em;letter-spacing:1px;margin-bottom:8px}
  .not-found p{color:var(--text3);font-size:0.9em}
  @media(max-width:600px){nav{padding:14px 20px}.ev-header,.tabs-bar,.tab-content,.meta-section,.actions-section{padding-left:20px;padding-right:20px}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="https://buildseal.io">Build<span>Seal</span></a>
  <div class="nav-right">
    <a class="nav-link" href="https://buildseal.io">Seal a document</a>
    <span class="nav-badge">Evidence</span>
  </div>
</nav>
<main id="main">
  <div class="loading"><div class="spinner"></div><div class="loading-text">LOADING EVIDENCE...</div></div>
</main>
<script>
const API='https://buildseal-api-production-3ca5.up.railway.app';
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function br(s){return s?esc(s).replace(/\n/g,"<br>"):"";}function humanTime(iso){if(!iso)return'--';try{return new Date(iso).toLocaleString('en-GB',{timeZone:'UTC',day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})+' UTC';}catch(e){return iso;}}
function shortHash(h,n=12){if(!h)return'';if(h.length<=n*2+1)return esc(h);return esc(h.slice(0,n))+'...'+esc(h.slice(-n));}
function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{const o=btn.textContent;btn.textContent='OK';setTimeout(()=>{btn.textContent=o;},1500);});}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('btn-'+tab).classList.add('active');
}
function renderDiff(draft,final_body){
  if(!draft||!final_body)return'<span style="color:var(--text3)">No diff available</span>';
  const urlMatch=final_body.match(/https:\/\/verify\.buildseal\.io\/release\/[^\s]+/);
  const url=urlMatch?urlMatch[0]:'';
  return br(draft).replace('[verify_url_pending]',
    '<span class="diff-removed">[verify_url_pending]</span> <span class="diff-added">'+esc(url)+'</span>'
  );
}
const id=new URLSearchParams(window.location.search).get('id')||window.location.pathname.split('/').filter(Boolean).pop();
if(!id||id==='evidence'||id==='evidence.html'){
  document.getElementById('main').innerHTML='<div class="not-found"><h2>NO SEAL ID</h2><p>No seal ID provided.</p></div>';
}else{
  fetch(API+'/evidence/'+encodeURIComponent(id))
    .then(r=>{if(!r.ok)throw new Error('not_found');return r.json();})
    .then(d=>{
      const draftOk=d.draft_integrity==='OK';
      const finalOk=d.final_integrity==='OK';
      const bothOk=draftOk&&finalOk;
      let html='<div class="container">';
      html+='<div class="ev-header"><div>';
      html+='<div class="ev-eyebrow">Communication Evidence</div>';
      html+='<div class="ev-title">Agent Decision Notification</div>';
      html+='<div class="ev-seal-id">'+esc(d.seal_id)+'</div>';
      html+='</div><div class="integrity-badge"><div class="dot"></div><span>'+(bothOk?'INTEGRITY VERIFIED':'INTEGRITY ISSUE')+'</span></div></div>';
      html+='<div class="tabs-bar">';
      html+='<button class="tab-btn active" id="btn-final" onclick="switchTab(\'final\')">Final Message</button>';
      html+='<button class="tab-btn" id="btn-draft" onclick="switchTab(\'draft\')">Draft (Sealed)</button>';
      html+='<button class="tab-btn" id="btn-diff" onclick="switchTab(\'diff\')">What Changed</button>';
      html+='</div><div class="message-section">';
      html+='<div class="tab-content active" id="tab-final">';
      html+='<div class="message-label">Delivered to recipient <span class="tag tag-final">FINAL</span></div>';
      html+='<div class="message-body">'+br(d.final_body||'')+'</div>';
      html+='<div class="hash-row"><span class="hash-label">SHA-256</span><span class="hash-val">'+shortHash(d.final_sha256)+'<button class="copy-btn" onclick="copyText(\''+esc(d.final_sha256||'')+'\',this)">copy</button></span><span class="integrity-ok">'+(finalOk?'OK':'MISMATCH')+'</span></div>';
      html+='</div>';
      html+='<div class="tab-content" id="tab-draft">';
      html+='<div class="message-label">Sealed before sending <span class="tag tag-draft">DRAFT</span></div>';
      html+='<div class="message-body">'+br(d.draft_body||'')+'</div>';
      html+='<div class="hash-row"><span class="hash-label">SHA-256</span><span class="hash-val">'+shortHash(d.draft_sha256)+'<button class="copy-btn" onclick="copyText(\''+esc(d.draft_sha256||'')+'\',this)">copy</button></span><span class="integrity-ok">'+(draftOk?'OK':'MISMATCH')+'</span></div>';
      html+='</div>';
      html+='<div class="tab-content" id="tab-diff">';
      html+='<div class="message-label">Only difference between draft and final</div>';
      html+='<div class="diff-box">'+renderDiff(d.draft_body,d.final_body)+'</div>';
      html+='<div class="diff-note">The only change is the verify URL replacing the placeholder. Message content is identical.</div>';
      html+='</div></div>';
      html+='<div class="meta-section">';
      html+='<div><div class="meta-label">Created At</div><div class="meta-value">'+humanTime(d.created_at)+'</div></div>';
      html+='<div><div class="meta-label">Draft Integrity</div><div class="meta-value" style="color:'+(draftOk?'var(--green)':'#ff5252')+'">'+(draftOk?'OK':'MISMATCH')+'</div></div>';
      html+='<div><div class="meta-label">Final Integrity</div><div class="meta-value" style="color:'+(finalOk?'var(--green)':'#ff5252')+'">'+(finalOk?'OK':'MISMATCH')+'</div></div>';
      html+='<div><div class="meta-label">Seal ID</div><div class="meta-value">'+esc(d.seal_id)+'</div></div>';
      html+='</div>';
      html+='<div class="actions-section">';
      html+='<a class="btn btn-primary" href="'+esc(d.verify_url||'#')+'" target="_blank">Verify Seal</a>';
      html+='<a class="btn btn-secondary" href="'+esc(d.pack_url||'#')+'" target="_blank">Decision Pack</a>';
      html+='<button class="btn btn-secondary" onclick="copyText(window.location.href,this)">Copy link</button>';
      html+='</div></div>';
      document.getElementById('main').innerHTML=html;
    })
    .catch(()=>{
      document.getElementById('main').innerHTML='<div class="not-found"><h2>EVIDENCE NOT FOUND</h2><p>No evidence for <code style="font-family:var(--mono);color:var(--text2)">'+esc(id)+'</code></p></div>';
    });
}
</script>
</body>
</html>
