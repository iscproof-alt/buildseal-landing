<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildSeal — Seal Your Work</title>
<style>
  body { font-family: Arial, sans-serif; background: #0f1117; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; max-width: 600px; padding: 40px; }
  h1 { font-size: 2.5em; margin-bottom: 10px; }
  p { color: #aaa; margin-bottom: 30px; }
  .drop-zone { border: 2px dashed #444; border-radius: 12px; padding: 60px 40px; cursor: pointer; transition: border-color 0.3s; }
  .drop-zone:hover { border-color: #fff; }
  .drop-zone input { display: none; }
  .btn { background: #fff; color: #000; border: none; padding: 14px 40px; font-size: 1em; border-radius: 8px; cursor: pointer; margin-top: 20px; font-weight: bold; }
  .btn:hover { background: #ddd; }
  .result { margin-top: 30px; background: #1a1a2e; border-radius: 8px; padding: 20px; text-align: left; display: none; }
  .result .label { color: #888; font-size: 0.8em; }
  .result .value { font-family: monospace; word-break: break-all; margin-bottom: 12px; }
  .seal-id { color: #4ade80; font-size: 1.2em; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <h1>🔒 BuildSeal</h1>
  <p>Dosyanı sürükle, tek tuşla seal'le.</p>
  <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" onchange="handleFile(this.files[0])">
    <div id="dropText">📄 Dosya seç veya buraya sürükle</div>
  </div>
  <div class="result" id="result">
    <div class="label">Seal ID</div>
    <div class="value seal-id" id="sealId"></div>
    <div class="label">Verify URL</div>
    <div class="value" id="verifyUrl"></div>
    <div class="label">Hash</div>
    <div class="value" id="hashVal"></div>
  </div>
</div>
<script>
async function handleFile(file) {
  if (!file) return;
  document.getElementById('dropText').textContent = '⏳ Sealing: ' + file.name;
  const buf = await file.arrayBuffer();
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  const hash = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
  const res = await fetch('/seal', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ artifact_hash: hash, repo: 'web-upload', commit: 'direct' })
  });
  const data = await res.json();
  document.getElementById('sealId').textContent = data.seal_id;
  document.getElementById('verifyUrl').textContent = data.verify_url;
  document.getElementById('hashVal').textContent = hash;
  document.getElementById('result').style.display = 'block';
  document.getElementById('dropText').textContent = '✅ ' + file.name + ' sealed!';
}
</script>
</body>
</html>
