<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BuildSeal — Seal Your Work</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f1117;
    color: #fff;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    max-width: 680px;
    width: 100%;
    padding: 40px;
    box-sizing: border-box;
  }
  h1 { font-size: 2.5em; margin-bottom: 10px; }
  p { color: #aaa; margin-bottom: 30px; }
  .drop-zone {
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 60px 40px;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
    user-select: none;
  }
  .drop-zone:hover { border-color: #fff; }
  .drop-zone.dragover { border-color: #4ade80; background: rgba(74,222,128,0.08); }
  .drop-zone input { display: none; }
  .step-indicator { color: #888; font-size: 0.9em; margin-top: 12px; min-height: 22px; }
  .status {
    margin-top: 16px;
    font-size: 0.95em;
    padding: 10px 16px;
    border-radius: 6px;
    display: none;
    text-align: left;
  }
  .status.error { background: #3b0000; color: #f87171; display: block; }
  .status.warning { background: #2a1f00; color: #fbbf24; display: block; }
  .status.success { background: #0d2a16; color: #86efac; display: block; }
  .result {
    margin-top: 30px;
    background: #1a1a2e;
    border-radius: 8px;
    padding: 20px;
    text-align: left;
    display: none;
  }
  .result .label { color: #888; font-size: 0.8em; text-transform: uppercase; margin-top: 12px; }
  .result .value { font-family: monospace; word-break: break-all; margin-top: 4px; }
  .seal-id { color: #4ade80; font-size: 1.2em; font-weight: bold; }
  .verify-link { color: #60a5fa; text-decoration: underline; cursor: pointer; }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
  .btn {
    display: inline-block;
    background: #fff;
    color: #000;
    padding: 10px 24px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    font-size: 0.95em;
    text-decoration: none;
  }
  .btn:hover { background: #ddd; }
  .btn.secondary { background: #4ade80; }
  .btn.secondary:hover { background: #22c55e; }
  .summary { margin-top: 16px; color: #d4d4d8; line-height: 1.55; word-break: normal; }
</style>
</head>
<body>
<div class="container">
  <h1>🔒 BuildSeal</h1>
  <p>PDF dosyanı sürükle, tek tuşla seal'le.</p>
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="application/pdf,.pdf" />
    <div id="dropText">📄 PDF seç veya buraya sürükle</div>
  </div>
  <div class="step-indicator" id="stepIndicator"></div>
  <div class="status" id="statusMsg"></div>
  <div class="result" id="result">
    <div class="label">Seal ID</div>
    <div class="value seal-id" id="sealId"></div>
    <div class="label">Dosya</div>
    <div class="value" id="fileName"></div>
    <div class="label">Hash (SHA-256)</div>
    <div class="value" id="hashVal"></div>
    <div class="label">Seal Zamanı</div>
    <div class="value" id="sealTime"></div>
    <div class="label">Root Hash</div>
    <div class="value" id="rootHash"></div>
    <div class="label">TSA Durumu</div>
    <div class="value" id="tsaStatus"></div>
    <div class="label">Verify</div>
    <div class="value">
      <a class="verify-link" id="verifyUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
    </div>
    <div class="summary" id="summaryText"></div>
    <div class="actions">
      <a class="btn" id="verifyBtn" href="#" target="_blank" rel="noopener noreferrer">Verify</a>
      <button class="btn secondary" id="downloadBtn" type="button" onclick="downloadSealSummary()">⬇ Seal Summary İndir</button>
    </div>
  </div>
</div>
<script>
const API_URL = 'https://buildseal-api-production-3ca5.up.railway.app/seal';
const REQUEST_TIMEOUT_MS = 90000;
const MAX_RETRIES = 3;
let sealData = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const dropText = document.getElementById('dropText');
const stepIndicator = document.getElementById('stepIndicator');
const statusMsg = document.getElementById('statusMsg');
const resultEl = document.getElementById('result');

function setStep(msg) { stepIndicator.textContent = msg || ''; }

function setStatus(type, msg) {
  statusMsg.className = 'status ' + type;
  statusMsg.textContent = msg;
  statusMsg.style.display = 'block';
}

function clearStatus() {
  statusMsg.className = 'status';
  statusMsg.textContent = '';
  statusMsg.style.display = 'none';
}

function resetResult() {
  resultEl.style.display = 'none';
  ['sealId','fileName','hashVal','sealTime','tsaStatus','summaryText'].forEach(id => {
    document.getElementById(id).textContent = '';
  });
  document.getElementById('verifyUrl').textContent = '';
  document.getElementById('verifyUrl').href = '#';
  document.getElementById('verifyBtn').href = '#';
  sealData = null;
}

function isPdf(file) {
  if (!file) return false;
  return file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
}

async function sha256Hex(file) {
  const buf = await file.arrayBuffer();
  const hashBuf = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function fetchWithTimeout(url, options, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    return res;
  } catch(e) {
    if (e.name === 'AbortError') throw new Error('timeout');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}

function normalizeApiData(data) {
  const sealId = data?.seal_id || data?.id || null;
  const verifyUrl = data?.verify_url || data?.verifyUrl || null;
  const sealTimestamp = data?.timestamp || data?.sealed_at || data?.created_at || data?.tsa_time || null;
  const tsaToken = data?.tsa || data?.tsa_token || null;
  const tsaStatus = data?.tsa_status || (tsaToken ? 'present' : 'missing');
  const root = data?.root || null;
  return { raw: data, seal_id: sealId, verify_url: verifyUrl, seal_timestamp: sealTimestamp, tsa_token: tsaToken, tsa_status: tsaStatus, root: root };
}

async function handleFile(file) {
  if (!file) return;
  clearStatus();
  resetResult();

  if (!isPdf(file)) {
    setStatus('error', '❌ Şu an yalnızca PDF dosyaları destekleniyor.');
    dropText.textContent = '📄 PDF seç veya buraya sürükle';
    return;
  }

  dropText.textContent = '⏳ ' + file.name;

  let hash;
  try {
    setStep('1/5 Dosya seçildi');
    setStep('2/5 Hash hesaplanıyor...');
    hash = await sha256Hex(file);
  } catch(e) {
    setStatus('error', '❌ Hash hesaplanamadı. Dosyayı tekrar dene.');
    dropText.textContent = '📄 PDF seç veya buraya sürükle';
    setStep('');
    return;
  }

  let data = null;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      setStep('3/5 Signing başlatılıyor...');
      await new Promise(r => setTimeout(r, 120));
      setStep('4/5 Timestamp alınıyor...' + (attempt > 1 ? ` (deneme ${attempt})` : ''));
      const res = await fetchWithTimeout(API_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ artifact_hash: hash, repo: 'web-upload', commit: 'direct', filename: file.name })
      }, REQUEST_TIMEOUT_MS);
      if (!res.ok) throw new Error('api_error_' + res.status);
      data = await res.json();
      break;
    } catch(e) {
      if (attempt < MAX_RETRIES) {
        setStep(`🔄 Yeniden deneniyor (${attempt}/${MAX_RETRIES})...`);
        await new Promise(r => setTimeout(r, 2000 * attempt));
      } else {
        setStatus('error', e.message === 'timeout'
          ? '❌ API yanıt vermedi (timeout). Backend uyuyor olabilir. 1 dakika sonra tekrar dene.'
          : '❌ API hatası: ' + e.message);
        dropText.textContent = '📄 PDF seç veya buraya sürükle';
        setStep('');
        return;
      }
    }
  }

  setStep('5/5 Paket hazırlanıyor...');
  const n = normalizeApiData(data);

  sealData = {
    schema: 'buildseal/seal-summary@1',
    seal_id: n.seal_id,
    file_name: file.name,
    content_hash: hash,
    verify_url: n.verify_url,
    seal_timestamp: n.seal_timestamp,
    tsa_status: n.tsa_status,
    tsa_token_present: !!n.tsa_token,
    root: n.root || null,
    raw_response: n.raw
  };

  document.getElementById('sealId').textContent = n.seal_id || 'N/A';
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('hashVal').textContent = hash;
  document.getElementById('sealTime').textContent = n.seal_timestamp || '⚠️ Backend seal zamanı dönmedi';
  document.getElementById('rootHash').textContent = n.root || '—';
  document.getElementById('tsaStatus').textContent = n.tsa_status === 'present' ? 'Bağımsız TSA bilgisi mevcut' : 'Bağımsız TSA bilgisi dönmedi';

  const verifyUrl = n.verify_url || '#';
  document.getElementById('verifyUrl').textContent = n.verify_url || 'Verify URL dönmedi';
  document.getElementById('verifyUrl').href = verifyUrl;
  document.getElementById('verifyBtn').href = verifyUrl;
  document.getElementById('summaryText').textContent = n.verify_url
    ? `${file.name} için seal oluşturuldu. Verify link hazır.`
    : `${file.name} için seal yanıtı alındı ancak verify link dönmedi.`;

  resultEl.style.display = 'block';
  dropText.textContent = '✅ ' + file.name + ' sealed!';
  setStep('');

  setStatus(n.tsa_status === 'present' ? 'success' : 'warning',
    n.tsa_status === 'present'
      ? '✅ Seal tamamlandı.'
      : '⚠️ TSA bilgisi dönmedi. Seal üretildi, ancak bağımsız zaman damgası bu yanıtta görünmüyor.');
}

function downloadSealSummary() {
  if (!sealData) return;
  const blob = new Blob([JSON.stringify(sealData, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'seal-summary-' + (sealData.seal_id || 'unknown') + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => handleFile(e.target.files?.[0]));
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files?.[0]);
});
</script>
</body>
</html>
